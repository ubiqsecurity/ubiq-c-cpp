workflow:
    rules:
        - if: $CI_COMMIT_TAG
        - if: $CI_COMMIT_BRANCH
        - if: $CI_MERGE_REQUEST_IID

#image:
#    name: debian:stable

services:
    - docker:18-dind

variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
        - build

stages:
    - build
    - test
    - deploy

build-debian-11:
    image: debian:bullseye
    variables:
        GIT_SUBMODULE_STRATEGY: recursive
    stage: build
    before_script:
        - apt -y update
        - apt -y install cmake gcc g++
        - apt -y install libcurl4-openssl-dev libssl-dev
        - apt -y install dpkg-dev file libgmp-dev
        - apt -y install libunistring-dev
    script:
        - cmake -S. -Bbuild
        - cmake --build build -- -j$(nproc)
        - cmake --build build --target package -- -j$(nproc)
    cache:
       key: "debian-11-${CI_COMMIT_REF_SLUG}"
       paths:
        - build

build-debian-12:
    image: debian:bookworm
    variables:
        GIT_SUBMODULE_STRATEGY: recursive
    stage: build
    before_script:
        - apt -y update
        - apt -y install cmake gcc g++
        - apt -y install libcurl4-openssl-dev libssl-dev
        - apt -y install dpkg-dev file libgmp-dev
        - apt -y install libunistring-dev
    script:
        - cmake -S. -Bbuild
        - cmake --build build -- -j$(nproc)
        - cmake --build build --target package -- -j$(nproc)
    cache:
       key: "debian-12-${CI_COMMIT_REF_SLUG}"
       paths:
        - build

build-centos-9-stream:
    image: quay.io/centos/centos:stream9
    variables:
        GIT_SUBMODULE_STRATEGY: recursive
    stage: build
    before_script:
        - yum -y update
        - yum install -y gcc gcc-c++ make gmp-c++ gmp-devel 
        - yum install -y openssl-devel libcurl-devel file rpm-build cmake
        - cd /tmp
        - curl -LOJ https://mirror.stream.centos.org/9-stream/CRB/x86_64/os/Packages/libunistring-devel-0.9.10-15.el9.x86_64.rpm
        - yum install -y ./libunistring*.rpm
        - rm -f ./lib*.rpm
        - cd -
    script:
        - cmake -S. -Bbuild
        - cmake --build build -- -j$(nproc)
        - cmake --build build --target package -- -j$(nproc)
    cache:
       key: "centos-${CI_COMMIT_REF_SLUG}"
       paths:
        - build

.test-debian-11:
    image: debian:bullseye
    stage: test
    before_script:
        - apt -y update
        - apt -y install libcurl4 libssl1.1
    script:
        - ldd build/src/test/unittests
        - build/src/test/unittests
        - ldd build/src/test/test_performance
        - ls -l build/src/test src/test/DATA src/test/ubiq-test-data/dev src/test/ubiq-test-data/prod 
        - build/src/test/test_performance_c
        - build/src/test/test_performance
    cache:
       key: "debian-11-${CI_COMMIT_REF_SLUG}"
       paths:
        - build


test-debian-11_dev:
    extends: .test-debian-11
    rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == 'schedule'
    environment: ubs-usw2-dvc

test-debian-11_prod:
    extends: .test-debian-11
    rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      when: on_success
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: on_success
    - if: $CI_PIPELINE_SOURCE == 'schedule'
      when: on_success
    environment: ubs-usw2-prcv3


